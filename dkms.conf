#
# DKMS configuration for the Minisforum MS-A1 EC hwmon driver.
#
# Signing: on Ubuntu/Zorin 24.04 the dkms framework will automatically sign
# the built module if /etc/dkms/framework.conf.d/msa1.conf points at our MOK
# key (packaging/install.sh writes that file).

PACKAGE_NAME="msa1-ec"
PACKAGE_VERSION="0.1.0"

BUILT_MODULE_NAME[0]="msa1_ec"
BUILT_MODULE_LOCATION[0]="src/"
DEST_MODULE_LOCATION[0]="/extra"

MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/src modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/src clean"

AUTOINSTALL="yes"
REMAKE_INITRD="no"
